<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>DEBUG</title></head>
<body>
<h2>Debug Upload</h2>
<input type="file" id="f" accept=".log,.txt">
<pre id="out">等待上传...</pre>
<script>
const LINE_RE=/^([NET]):\s+(\d{2})\s+(\d{2}:\d{2}:\d{2})\.(\d+)-(.+)$/;
const DEVICE_RE=/设备[：:](\w+)/;
const DEVICE_TAG_RE=/<设备[：:](\w+)/;
const BAOCUO_RE=/报错[：:]\s*(.+?)(?:$|[,;，；])/;
const NOREAD_RE=/错误条码\s*NOREAD/i;
const WMS_RE=/等待WMS回复入库货位/;
const TASK_RE=/任务写入(\d*)次?失败/;

function parseLine(line,fd){var m=line.match(LINE_RE);if(!m)return null;var l=m[1],d=m[2],t=m[3],ms=m[4],msg=m[5];var hh=t.split(':').map(Number);var ts=fd+'T'+String(hh[0]).padStart(2,'0')+':'+String(hh[1]).padStart(2,'0')+':'+String(hh[2]).padStart(2,'0')+'.'+ms;var dev=null;var dm=msg.match(DEVICE_RE);var dm2=msg.match(DEVICE_TAG_RE);if(dm)dev=dm[1];else if(dm2)dev=dm2[1];var al=l;if(l==='E'&&WMS_RE.test(msg))al='N';var et=null;if(al==='E'){var bc=msg.match(BAOCUO_RE);if(bc)et=bc[1].trim();else if(NOREAD_RE.test(msg))et='NOREAD';else if(TASK_RE.test(msg))et='任务写入失败';else et='其他';}return{ts:ts,dev:dev,level:al,type:et,msg:msg.substring(0,100)};}

document.getElementById('f').addEventListener('change',function(){
  var file=this.files[0]; if(!file){document.getElementById('out').textContent='无文件';return;}
  document.getElementById('out').textContent='读取中...';
  var reader=new FileReader();
  reader.onload=function(){
    var text=reader.result;
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
    var fd='2026-06-02';
    var entries=[];
    for(var i=0;i<lines.length;i++){
      var e=parseLine(lines[i],fd);
      if(e)entries.push(e);
    }
    var errs=entries.filter(function(e){return e.level==='E';});
    var out='文件: '+file.name+'\n';
    out+='总行数: '+lines.length+'\n';
    out+='解析: '+entries.length+' 条\n';
    out+='错误: '+errs.length+' 条\n';
    out+='正常: '+entries.filter(function(e){return e.level==='N';}).length+' 条\n';
    out+='\n前10条错误:\n';
    for(var i=0;i<Math.min(10,errs.length);i++){
      out+=errs[i].ts+' ['+errs[i].dev+'] '+errs[i].type+' | '+errs[i].msg+'\n';
    }
    document.getElementById('out').textContent=out;
  };
  reader.onerror=function(){document.getElementById('out').textContent='读取失败';};
  reader.readAsText(file);
});
</script>
</body></html>
