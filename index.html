<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCS 日志分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
body{font:14px/1.5 -apple-system,"Microsoft YaHei",sans-serif;background:#11141b;color:#e0e4ec;margin:0;padding:16px 24px}
h1{font-size:18px;margin:0}
.row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.card{background:#1a1e28;border-radius:8px;padding:12px;flex:1;min-width:300px}
.card h3{font-size:13px;margin:0 0 8px 0}
.stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:#1a1e28;border-radius:8px;padding:8px 12px;text-align:center;border-top:3px solid #59f}
.stat:nth-child(2){border-top-color:#f44}.stat:nth-child(3){border-top-color:#0c8}.stat:nth-child(4){border-top-color:#fa3}.stat:nth-child(5){border-top-color:#a78bfa}.stat:nth-child(6){border-top-color:#f97316}
.sv{font-size:18px;font-weight:700}.sl{font-size:10px;color:#78809a}
.btn{padding:7px 14px;border:1px solid #59f;border-radius:5px;background:#59f;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.btn2{padding:7px 14px;border:1px solid #2a3040;border-radius:5px;background:transparent;color:#78809a;cursor:pointer;font-size:13px;font-family:inherit}
.btn2:hover{color:#e0e4ec}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#252a38;padding:9px 12px;text-align:left;color:#78809a;white-space:nowrap}
td{padding:7px 12px;border-bottom:1px solid #2a3040;white-space:nowrap}
.ok{color:#0c8}.fail{color:#f44}.badge-ok{color:#0c8;font-weight:600}.badge-no{color:#f44;font-weight:600}
input[type=file]{padding:7px 14px;border:1px solid #59f;border-radius:5px;background:#59f;color:#fff;cursor:pointer;font-size:13px}
input[type=file]::file-selector-button{display:none}
.msg{padding:8px 0;font-size:13px}
.filters{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.filters select{padding:5px 10px;background:#252a38;border:1px solid #2a3040;border-radius:5px;color:#e0e4ec;font-size:12px}
.page{font-size:12px;color:#78809a}
.eb-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px}
.eb-label{width:90px;text-align:right;color:#78809a;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eb-track{flex:1;height:16px;background:#252a38;border-radius:3px;overflow:hidden}
.eb-fill{height:100%;border-radius:3px}
.eb-count{width:45px;text-align:right;font-weight:600;flex-shrink:0}
.eb-pct{width:36px;text-align:right;color:#78809a;font-size:11px;flex-shrink:0}
.chart-wrap{position:relative;height:300px}
.chart-wrap canvas{height:300px !important}
.tab-btn{padding:8px 16px;border:1px solid #2a3040;border-radius:6px;background:transparent;color:#78809a;cursor:pointer;font-size:13px;font-family:inherit}
.tab-btn.active{background:#59f;border-color:#59f;color:#fff}
</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid #2a3040;margin-bottom:12px">
  <div style="display:flex;align-items:center;gap:10px"><h1>WCS 仓储设备日志分析</h1><span class="sl" id="tag">无数据</span></div>
  <div style="display:flex;gap:8px">
    <input type="file" id="fupload" multiple accept=".log,.txt">
    <button class="btn2" onclick="clearAll()">清除</button>
    <button class="btn2" onclick="exportCSV()">导出</button>
  </div>
</div>
<div class="msg" id="msg"></div>

<!-- Tabs -->
<div style="display:flex;gap:8px;margin-bottom:10px">
  <button class="tab-btn active" onclick="switchTab('day')" id="tabDay">当日故障</button>
  <button class="tab-btn" onclick="switchTab('week')" id="tabWeek">周故障分析</button>
</div>

<!-- DAY VIEW -->
<div id="viewDay">
  <div class="stats">
    <div class="stat"><div class="sv" id="s1">-</div><div class="sl">故障事件</div></div>
    <div class="stat"><div class="sv" id="s2">-</div><div class="sl">已解决</div></div>
    <div class="stat"><div class="sv" id="s3">-</div><div class="sl">未解决</div></div>
    <div class="stat"><div class="sv" id="s4">-</div><div class="sl">平均耗时</div></div>
    <div class="stat"><div class="sv" id="s5">-</div><div class="sl">最长耗时</div></div>
    <div class="stat"><div class="sv" id="s6">-</div><div class="sl">分析天数</div></div>
  </div>

  <div class="row">
    <div class="card"><h3>设备故障排行</h3><div class="chart-wrap"><canvas id="chartDev"></canvas></div></div>
    <div class="card"><h3>错误类型分布</h3><div id="errBars"></div></div>
  </div>

  <div class="filters">
    <select id="fd"><option value="">全部设备</option></select>
    <select id="ft"><option value="">全部类型</option></select>
    <select id="fr"><option value="">全部状态</option><option value="1">已解决</option><option value="0">未解决</option></select>
    <span class="page" id="pg"></span>
    <button class="btn2" onclick="changePage(-1)">◀</button>
    <button class="btn2" onclick="changePage(1)">▶</button>
  </div>
  <table><thead><tr><th>设备</th><th>类型</th><th>日期</th><th>开始</th><th>结束</th><th>持续</th><th>重复</th><th>条码</th><th>状态</th></tr></thead><tbody id="tb"></tbody></table>
</div>

<!-- WEEK VIEW -->
<div id="viewWeek" style="display:none">
  <div class="msg" id="wmsg"></div>
  <div class="row">
    <div class="card"><h3>周设备故障排行</h3><div class="chart-wrap"><canvas id="chartWDev"></canvas></div></div>
    <div class="card"><h3>周故障趋势</h3><div class="chart-wrap"><canvas id="chartWTrend"></canvas></div></div>
  </div>
  <div class="card" style="margin-bottom:10px"><h3>周错误类型分布</h3><div id="wErrBars"></div></div>
  <table><thead><tr><th>日期</th><th>故障</th><th>已解决</th><th>未解决</th><th>平均</th><th>最长</th><th>主要故障设备</th></tr></thead><tbody id="wtb"></tbody></table>
</div>

<script>
// ============================== PARSER ==============================
var LINE_RE=/^([NET]):\s+(\d{2})\s+(\d{2}:\d{2}:\d{2})\.(\d+)-(.+)$/;
var DEV_RE=/设备[：:](\w+)/;
var DEV2_RE=/<设备[：:](\w+)/;
var BC_RE=/报错[：:]\s*(.+?)(?:$|[,;，；])/;
var NR_RE=/错误条码\s*NOREAD/i;
var WM_RE=/等待WMS回复入库货位/;
var TF_RE=/任务写入(\d*)次?失败/;
var YC_RE=/异常[：:]\s*(.+?)(?:$|[,;，；])/;
var BC2_RE=/条码[：:]\s*(\w+)/;

function parseLine(line,fd){
  var m=line.match(LINE_RE);if(!m)return null;
  var l=m[1],t=m[3],ms=m[4],msg=m[5];
  var hh=t.split(':').map(Number);
  var ts=fd+'T'+String(hh[0]).padStart(2,'0')+':'+String(hh[1]).padStart(2,'0')+':'+String(hh[2]).padStart(2,'0')+'.'+ms;
  var dev=null;
  var dm=msg.match(DEV_RE);var dm2=msg.match(DEV2_RE);
  if(dm)dev=dm[1];else if(dm2)dev=dm2[1];
  var al=l;if(l==='E'&&WM_RE.test(msg))al='N';
  var et=null;
  if(al==='E'){
    var bc=msg.match(BC_RE);var yc=msg.match(YC_RE);
    if(bc)et=bc[1].trim();
    else if(NR_RE.test(msg))et='NOREAD';
    else if(TF_RE.test(msg))et='任务写入失败';
    else if(yc){var y=yc[1].trim();var o=y.match(/ORA-\d+/);et=o?o[0]:y.substring(0,40)}
    else if(msg.indexOf('错误')>=0||msg.indexOf('故障')>=0)et='其他';
    else et='未分类';
  }
  var barcode=null;
  var bm=msg.match(BC2_RE);if(bm)barcode=bm[1];
  return {ts:ts,date:fd,device:dev,level:al,type:et,barcode:barcode,msg:msg.substring(0,200)};
}

function parseLog(text,filename){
  var dm=filename.match(/(\d{4})(\d{2})(\d{2})/);
  var fd=dm?dm[1]+'-'+dm[2]+'-'+dm[3]:'unknown';
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  var entries=[];for(var i=0;i<lines.length;i++){var e=parseLine(lines[i],fd);if(e)entries.push(e);}
  return {filename:filename,date:fd,entries:entries};
}

// ============================== ANALYZER ==============================
function extractIncidents(entries){
  var open={};var closed=[];
  for(var i=0;i<entries.length;i++){
    var e=entries[i];
    if((e.level==='N'||e.level==='T')&&e.device){
      var keys=Object.keys(open);
      for(var k=0;k<keys.length;k++){
        var key=keys[k];var dev=key.split('|')[0];
        if(dev===e.device){
          var inc=open[key];inc.resolved=true;inc.dur=Math.round((new Date(e.ts)-new Date(inc.st))/1000);
          if(!inc.bc&&e.barcode)inc.bc=e.barcode;
          if(e.barcode)inc.rb=e.barcode;
          closed.push(inc);delete open[key];
        }
      }
      continue;
    }
    if(e.level!=='E'||!e.device)continue;
    var key=e.device+'|'+(e.type||'未分类');
    if(open[key]){open[key].et=e.ts;open[key].rc++;}
    else open[key]={device:e.device,type:e.type||'未分类',st:e.ts,et:e.ts,date:e.date,bc:e.barcode,rb:null,rc:1,resolved:false,dur:0};
  }
  var okeys=Object.keys(open);
  for(var i=0;i<okeys.length;i++){var inc=open[okeys[i]];inc.dur=Math.round((new Date(inc.et)-new Date(inc.st))/1000);closed.push(inc);}
  return closed.sort(function(a,b){return a.st.localeCompare(b.st);});
}

function summarize(inc){
  var res=inc.filter(function(i){return i.resolved;});
  var d=res.map(function(i){return i.dur;});
  var avg=d.length?Math.round(d.reduce(function(a,b){return a+b;},0)/d.length):0;
  var max=d.length?Math.max.apply(null,d):0;
  return{total:inc.length,resolved:res.length,unresolved:inc.length-res.length,avgSec:avg,maxSec:max};
}

function deviceRank(inc){
  var map={};
  for(var i=0;i<inc.length;i++){
    var dev=inc[i].device;if(!map[dev])map[dev]={device:dev,total:0,types:{}};
    map[dev].total++;map[dev].types[inc[i].type]=(map[dev].types[inc[i].type]||0)+1;
  }
  return Object.values(map).sort(function(a,b){return b.total-a.total;});
}

function typeDist(inc){
  var map={};
  for(var i=0;i<inc.length;i++){var t=inc[i].type;map[t]=(map[t]||0)+1;}
  var keys=Object.keys(map);
  return keys.map(function(k){return{type:k,count:map[k],pct:(map[k]/inc.length*100).toFixed(1)};}).sort(function(a,b){return b.count-a.count;});
}

function fmtDur(sec){
  if(sec<60)return sec+'秒';
  if(sec<3600)return Math.floor(sec/60)+'分'+sec%60+'秒';
  return Math.floor(sec/3600)+'时'+Math.floor((sec%3600)/60)+'分';
}

// ============================== STATE ==============================
var logStore={};var currentPage=1;var PAGE_SIZE=15;
var incidents=[],filtered=[];
var devChart=null,wdevChart=null,wtrendChart=null;
var currentTab='day';

// ============================== INIT ==============================
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('fupload').addEventListener('change',function(){
    var files=this.files;if(!files||!files.length)return;
    document.getElementById('msg').innerHTML='解析中...';
    var done=0;var html='';
    for(var i=0;i<files.length;i++){
      (function(file){
        var r=new FileReader();
        r.onload=function(){
          var p=parseLog(r.result,file.name);
          logStore[p.date]=p;
          html+='<span class="ok">'+file.name+' → '+p.entries.length+'条 / '+p.entries.filter(function(e){return e.level==='E';}).length+'错</span> ';
          done++;if(done>=files.length){document.getElementById('msg').innerHTML=html;currentPage=1;refresh();}
        };
        r.onerror=function(){html+='<span class="fail">'+file.name+':失败</span> ';done++;if(done>=files.length){document.getElementById('msg').innerHTML=html;currentPage=1;refresh();}};
        r.readAsText(file);
      })(files[i]);
    }
  });
  refresh();
});

function getAllEntries(){
  var entries=[];var dates=Object.keys(logStore);
  for(var i=0;i<dates.length;i++){var d=logStore[dates[i]];entries=entries.concat(d.entries);}
  entries.sort(function(a,b){return a.ts.localeCompare(b.ts);});
  return entries;
}

// ============================== TABS ==============================
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabDay').className='tab-btn'+(tab==='day'?' active':'');
  document.getElementById('tabWeek').className='tab-btn'+(tab==='week'?' active':'');
  document.getElementById('viewDay').style.display=tab==='day'?'block':'none';
  document.getElementById('viewWeek').style.display=tab==='week'?'block':'none';
  if(tab==='day')refreshDay();else refreshWeek();
}

// ============================== DAY VIEW ==============================
function refresh(){
  if(currentTab==='day')refreshDay();else refreshWeek();
}

function refreshDay(){
  var entries=getAllEntries();
  if(!entries.length){
    document.getElementById('tag').innerHTML='无数据';
    document.getElementById('s1').innerHTML='-';document.getElementById('s2').innerHTML='-';document.getElementById('s3').innerHTML='-';
    document.getElementById('s4').innerHTML='-';document.getElementById('s5').innerHTML='-';document.getElementById('s6').innerHTML='-';
    document.getElementById('tb').innerHTML='';return;
  }
  incidents=extractIncidents(entries);
  var sum=summarize(incidents);
  var dates=Object.keys(logStore);
  document.getElementById('tag').innerHTML=dates.length+'天数据';
  document.getElementById('s1').innerHTML=incidents.length;
  document.getElementById('s2').innerHTML=sum.resolved;
  document.getElementById('s3').innerHTML=sum.unresolved;
  document.getElementById('s4').innerHTML=(sum.avgSec/60).toFixed(1)+'分';
  document.getElementById('s5').innerHTML=(sum.maxSec/60).toFixed(1)+'分';
  document.getElementById('s6').innerHTML=dates.length;

  // Charts
  var rank=deviceRank(incidents).slice(0,15);
  renderDevChart(rank);
  renderErrorBars('errBars',typeDist(incidents));

  // Filters
  var dist=typeDist(incidents);
  var fd=document.getElementById('fd');
  fd.innerHTML='<option value="">全部设备</option>';
  for(var i=0;i<rank.length;i++){fd.innerHTML+='<option>'+rank[i].device+'</option>';}
  var ft=document.getElementById('ft');
  ft.innerHTML='<option value="">全部类型</option>';
  for(var i=0;i<dist.length;i++){ft.innerHTML+='<option>'+dist[i].type+'</option>';}
  document.getElementById('fd').onchange=function(){currentPage=1;filterIncidents();};
  document.getElementById('ft').onchange=function(){currentPage=1;filterIncidents();};
  document.getElementById('fr').onchange=function(){currentPage=1;filterIncidents();};

  filterIncidents();
}

function renderDevChart(rank){
  if(devChart){devChart.destroy();devChart=null;}
  var ctx=document.getElementById('chartDev');if(!ctx||!rank.length)return;
  if(typeof Chart==='undefined'){document.getElementById('chartDev').parentNode.innerHTML='<span style="color:#78809a">图表加载失败</span>';return;}
  try{
    devChart=new Chart(ctx,{type:'bar',data:{labels:rank.map(function(d){return d.device;}),datasets:[{data:rank.map(function(d){return d.total;}),backgroundColor:rank.map(function(_,i){return 'rgba(255,68,68,'+(1-i*0.05)+')';}),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#78809a',font:{size:10}},grid:{color:'#2a3040'}},y:{ticks:{color:'#e0e4ec',font:{size:11}},grid:{display:false}}}}});
  }catch(e){document.getElementById('chartDev').parentNode.innerHTML='<span style="color:#f44">图表错误: '+e.message+'</span>';}
}

function renderErrorBars(id,dist){
  var c=document.getElementById(id);if(!c||!dist.length)return;
  var colors=['#f44','#fa3','#f97316','#59f','#0c8','#a78bfa','#78809a'];
  var max=dist[0].count;
  var html='';
  for(var i=0;i<Math.min(dist.length,15);i++){
    var d=dist[i];
    html+='<div class="eb-row"><span class="eb-label" title="'+d.type+'">'+d.type+'</span><div class="eb-track"><div class="eb-fill" style="width:'+Math.round(d.count/max*100)+'%;background:'+colors[i%7]+'"></div></div><span class="eb-count">'+d.count+'</span><span class="eb-pct">'+d.pct+'%</span></div>';
  }
  c.innerHTML=html;
}

function filterIncidents(){
  var dev=document.getElementById('fd').value;
  var typ=document.getElementById('ft').value;
  var res=document.getElementById('fr').value;
  filtered=[];
  for(var i=0;i<incidents.length;i++){
    var inc=incidents[i];
    if(dev&&inc.device!==dev)continue;
    if(typ&&inc.type!==typ)continue;
    if(res==='1'&&!inc.resolved)continue;
    if(res==='0'&&inc.resolved)continue;
    filtered.push(inc);
  }
  var start=(currentPage-1)*PAGE_SIZE;
  var items=filtered.slice(start,start+PAGE_SIZE);
  var tbody=document.getElementById('tb');
  if(!items.length){tbody.innerHTML='<tr><td colspan="9" style="color:#78809a;text-align:center;padding:20px">无匹配</td></tr>';}
  else{
    tbody.innerHTML='';
    for(var i=0;i<items.length;i++){
      var inc=items[i];
      tbody.innerHTML+='<tr><td><strong>'+inc.device+'</strong></td><td>'+inc.type+'</td><td>'+inc.date+'</td><td>'+inc.st.slice(11,19)+'</td><td>'+inc.et.slice(11,19)+'</td><td>'+fmtDur(inc.dur)+'</td><td>'+inc.rc+'</td><td>'+(inc.rb||inc.bc||'-')+'</td><td class="'+(inc.resolved?'badge-ok':'badge-no')+'">'+(inc.resolved?'已解决':'未解决')+'</td></tr>';
    }
  }
  var totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
  document.getElementById('pg').innerHTML=filtered.length+'条 · '+currentPage+'/'+totalPages+'页';
}

function changePage(d){currentPage=Math.max(1,currentPage+d);filterIncidents();}

// ============================== WEEK VIEW ==============================
function refreshWeek(){
  var dates=Object.keys(logStore).sort();
  if(!dates.length){document.getElementById('wtb').innerHTML='<tr><td colspan="7" style="color:#78809a;text-align:center;padding:20px">无数据</td></tr>';return;}
  var dailyData=[];
  for(var i=0;i<dates.length;i++){
    var entries=logStore[dates[i]].entries;
    var inc=extractIncidents(entries);
    var sum=summarize(inc);
    var rank=deviceRank(inc);
    var tops=[];
    for(var j=0;j<Math.min(5,rank.length);j++){tops.push(rank[j].device+'('+rank[j].total+')');}
    dailyData.push({date:dates[i],total:inc.length,resolved:sum.resolved,unresolved:sum.unresolved,avg:(sum.avgSec/60).toFixed(1),max:(sum.maxSec/60).toFixed(1),tops:tops.join(', ')});
  }

  // Week summary
  var allEntries=getAllEntries();
  var allInc=extractIncidents(allEntries);
  var allSum=summarize(allInc);
  document.getElementById('wmsg').innerHTML='<span class="ok">共'+allInc.length+'条故障 · 已解决'+allSum.resolved+' · 平均'+(allSum.avgSec/60).toFixed(1)+'分 · 最长'+(allSum.maxSec/60).toFixed(1)+'分</span>';

  // Week device chart
  var wrank=deviceRank(allInc).slice(0,15);
  renderWDevChart(wrank);

  // Week error bars
  renderErrorBars('wErrBars',typeDist(allInc));

  // Trend chart
  renderWTrend(dailyData);

  // Table
  var tbody=document.getElementById('wtb');
  tbody.innerHTML='';
  for(var i=0;i<dailyData.length;i++){
    var d=dailyData[i];
    tbody.innerHTML+='<tr><td><strong>'+d.date+'</strong></td><td>'+d.total+'</td><td style="color:#0c8">'+d.resolved+'</td><td style="color:#f44">'+d.unresolved+'</td><td>'+d.avg+'分</td><td>'+d.max+'分</td><td>'+d.tops+'</td></tr>';
  }
}

function renderWDevChart(rank){
  if(wdevChart){wdevChart.destroy();wdevChart=null;}
  var ctx=document.getElementById('chartWDev');if(!ctx||!rank.length)return;
  if(typeof Chart==='undefined')return;
  try{
    wdevChart=new Chart(ctx,{type:'bar',data:{labels:rank.map(function(d){return d.device;}),datasets:[{data:rank.map(function(d){return d.total;}),backgroundColor:rank.map(function(_,i){return 'rgba(255,68,68,'+(1-i*0.05)+')';}),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#78809a',font:{size:10}},grid:{color:'#2a3040'}},y:{ticks:{color:'#e0e4ec',font:{size:11}},grid:{display:false}}}}});
  }catch(e){}
}

function renderWTrend(dailyData){
  if(wtrendChart){wtrendChart.destroy();wtrendChart=null;}
  var ctx=document.getElementById('chartWTrend');if(!ctx||!dailyData.length)return;
  if(typeof Chart==='undefined')return;
  try{
    wtrendChart=new Chart(ctx,{type:'bar',data:{labels:dailyData.map(function(d){return d.date.slice(5);}),datasets:[{label:'故障',data:dailyData.map(function(d){return d.total;}),backgroundColor:'rgba(244,68,68,0.7)',borderRadius:4},{label:'己解决',data:dailyData.map(function(d){return d.resolved;}),backgroundColor:'rgba(0,200,150,0.7)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#e0e4ec',font:{size:11}}}},scales:{x:{ticks:{color:'#78809a'},grid:{display:false}},y:{ticks:{color:'#78809a'},grid:{color:'#2a3040'}}}}});
  }catch(e){}
}

// ============================== CLEAR / EXPORT ==============================
function clearAll(){
  if(!confirm('确定清除所有数据？'))return;
  logStore={};incidents=[];filtered=[];currentPage=1;
  if(devChart){devChart.destroy();devChart=null;}
  if(wdevChart){wdevChart.destroy();wdevChart=null;}
  if(wtrendChart){wtrendChart.destroy();wtrendChart=null;}
  refresh();
}

function exportCSV(){
  var csv='设备,错误类型,日期,开始时间,结束时间,持续(秒),重复次数,条码,状态\n';
  for(var i=0;i<incidents.length;i++){
    var inc=incidents[i];
    csv+=inc.device+','+inc.type+','+inc.date+','+inc.st.slice(11,19)+','+inc.et.slice(11,19)+','+inc.dur+','+inc.rc+','+(inc.rb||inc.bc||'')+','+(inc.resolved?'已解决':'未解决')+'\n';
  }
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wcs-incidents.csv';a.click();
  URL.revokeObjectURL(a.href);
}
</script>
