<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCS 日志分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.1/dist/mqtt.min.js"></script>
<style>
body{font:14px/1.5 -apple-system,"Microsoft YaHei",sans-serif;background:#11141b;color:#e0e4ec;margin:0;padding:16px 24px}
h1{font-size:18px;margin:0}
.row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.card{background:#1a1e28;border-radius:8px;padding:12px;flex:1;min-width:300px}
.card h3{font-size:13px;margin:0 0 8px 0}
.stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:#1a1e28;border-radius:8px;padding:8px 12px;text-align:center;border-top:3px solid #59f}
.stat:nth-child(2){border-top-color:#f44}.stat:nth-child(3){border-top-color:#0c8}.stat:nth-child(4){border-top-color:#fa3}.stat:nth-child(5){border-top-color:#a78bfa}.stat:nth-child(6){border-top-color:#f97316}
.sv{font-size:18px;font-weight:700}.sl{font-size:10px;color:#78809a}
.btn{padding:7px 14px;border:1px solid #59f;border-radius:5px;background:#59f;color:#fff;cursor:pointer;font-size:13px;font-family:inherit;white-space:nowrap}
.btn2{padding:7px 14px;border:1px solid #2a3040;border-radius:5px;background:transparent;color:#78809a;cursor:pointer;font-size:13px;font-family:inherit}
.btn2:hover{color:#e0e4ec}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#252a38;padding:9px 12px;text-align:left;color:#78809a;white-space:nowrap}
td{padding:7px 12px;border-bottom:1px solid #2a3040;white-space:nowrap}
.ok{color:#0c8}.fail{color:#f44}.badge-ok{color:#0c8;font-weight:600}.badge-no{color:#f44;font-weight:600}
input[type=file]{padding:7px 14px;border:1px solid #59f;border-radius:5px;background:#59f;color:#fff;cursor:pointer;font-size:13px}
input[type=file]::file-selector-button{display:none}
.msg{padding:8px 0;font-size:13px}
.filters{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.filters select{padding:5px 10px;background:#252a38;border:1px solid #2a3040;border-radius:5px;color:#e0e4ec;font-size:12px}
.page{font-size:12px;color:#78809a}
.eb-row{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:4px}
.eb-label{width:90px;text-align:right;color:#78809a;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eb-track{flex:1;height:16px;background:#252a38;border-radius:3px;overflow:hidden}
.eb-fill{height:100%;border-radius:3px}
.eb-count{width:45px;text-align:right;font-weight:600;flex-shrink:0}
.eb-pct{width:36px;text-align:right;color:#78809a;font-size:11px;flex-shrink:0}
.chart-wrap{position:relative;height:300px}
.chart-wrap canvas{height:300px !important}
.tab-btn{padding:8px 16px;border:1px solid #2a3040;border-radius:6px;background:transparent;color:#78809a;cursor:pointer;font-size:13px;font-family:inherit}
.tab-btn.active{background:#59f;border-color:#59f;color:#fff}
.dtabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.dtab{padding:5px 14px;border:1px solid #2a3040;border-radius:16px;background:transparent;color:#78809a;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.dtab:hover{border-color:#78809a;color:#e0e4ec}
.dtab.active{background:#252a38;border-color:#59f;color:#59f}
.dtab .de{font-size:10px;color:#f44;margin-left:4px}
</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid #2a3040;margin-bottom:12px">
  <div style="display:flex;align-items:center;gap:10px"><h1>WCS 仓储设备日志分析</h1><span class="sl" id="tag">无数据</span></div>
  <div style="display:flex;gap:8px">
    <input type="file" id="fupload" multiple accept=".log,.txt">
    <button class="btn2" onclick="clearAll()">清除</button>
    <button class="btn2" onclick="exportCSV()">导出</button>
    <button class="btn2" id="btnMQTT" onclick="toggleMQTTConfig()" title="数据共享设置">⚙</button>
  </div>
</div>
<div id="mqttCfg" style="display:none;padding:8px 0;display:none;align-items:center;gap:8px;flex-wrap:wrap">
  <span style="font-size:12px;color:#78809a">Broker:</span>
  <input id="mqttUrl" style="padding:5px 10px;background:#252a38;border:1px solid #2a3040;border-radius:5px;color:#e0e4ec;font-size:12px;width:240px" placeholder="wss://broker.emqx.io:8084/mqtt">
  <button class="btn2" onclick="connectMQTT()">连接</button>
  <button class="btn2" onclick="disconnectMQTT()">断开</button>
  <span id="mqttStatus" style="font-size:12px;color:#78809a"></span>
</div>
<div class="msg" id="msg"></div>

<!-- Date selector -->
<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
  <span style="font-size:13px;color:#78809a">选择日期：</span>
  <select id="dsel" style="padding:6px 12px;background:#252a38;border:1px solid #2a3040;border-radius:6px;color:#e0e4ec;font-size:13px;font-family:inherit;min-width:200px" onchange="selectDate(this.value)"></select>
  <button id="btnDelDate" class="btn2" style="display:none" onclick="deleteCurrentDate()">删除此日期</button>
</div>

<!-- Tabs -->
<div style="display:flex;gap:8px;margin-bottom:10px">
  <button class="tab-btn active" onclick="switchTab('day')" id="tabDay">当日故障</button>
  <button class="tab-btn" onclick="switchTab('week')" id="tabWeek">周故障分析</button>
</div>

<!-- DAY VIEW -->
<div id="viewDay">
  <div class="stats">
    <div class="stat"><div class="sv" id="s1">-</div><div class="sl">故障事件</div></div>
    <div class="stat"><div class="sv" id="s2">-</div><div class="sl">已解决</div></div>
    <div class="stat"><div class="sv" id="s3">-</div><div class="sl">未解决</div></div>
    <div class="stat"><div class="sv" id="s4">-</div><div class="sl">平均耗时</div></div>
    <div class="stat"><div class="sv" id="s5">-</div><div class="sl">最长耗时</div></div>
    <div class="stat"><div class="sv" id="s6">-</div><div class="sl">分析天数</div></div>
  </div>

  <div class="row">
    <div class="card"><h3>设备故障排行</h3><div class="chart-wrap"><canvas id="chartDev"></canvas></div></div>
    <div class="card"><h3>错误类型分布</h3><div id="errBars"></div></div>
  </div>

  <div class="filters">
    <select id="fd"><option value="">全部设备</option></select>
    <select id="ft"><option value="">全部类型</option></select>
    <select id="fr"><option value="">全部状态</option><option value="1">已解决</option><option value="0">未解决</option></select>
    <span class="page" id="pg"></span>
    <button class="btn2" onclick="changePage(-1)">◀</button>
    <button class="btn2" onclick="changePage(1)">▶</button>
  </div>
  <table><thead><tr><th>设备</th><th>类型</th><th>日期</th><th>开始</th><th>结束</th><th>持续</th><th>重复</th><th>条码</th><th>状态</th></tr></thead><tbody id="tb"></tbody></table>
</div>

<!-- WEEK VIEW -->
<div id="viewWeek" style="display:none">
  <div class="msg" id="wmsg"></div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
    <span style="font-size:13px;color:#78809a">日期范围：</span>
    <select id="wsFrom" style="padding:5px 10px;background:#252a38;border:1px solid #2a3040;border-radius:5px;color:#e0e4ec;font-size:12px;font-family:inherit" onchange="refreshWeek()"></select>
    <span style="color:#78809a">至</span>
    <select id="wsTo" style="padding:5px 10px;background:#252a38;border:1px solid #2a3040;border-radius:5px;color:#e0e4ec;font-size:12px;font-family:inherit" onchange="refreshWeek()"></select>
  </div>
  <div class="row">
    <div class="card"><h3>周设备故障排行</h3><div class="chart-wrap"><canvas id="chartWDev"></canvas></div></div>
    <div class="card"><h3>周故障趋势</h3><div class="chart-wrap"><canvas id="chartWTrend"></canvas></div></div>
  </div>
  <div class="card" style="margin-bottom:10px"><h3>周错误类型分布</h3><div id="wErrBars"></div></div>
  <table><thead><tr><th>日期</th><th>故障</th><th>已解决</th><th>未解决</th><th>平均</th><th>最长</th><th>主要故障设备</th></tr></thead><tbody id="wtb"></tbody></table>

  <h3 style="margin:14px 0 8px 0">周故障事件列表</h3>
  <div class="filters">
    <select id="wfd"><option value="">全部设备</option></select>
    <select id="wft"><option value="">全部类型</option></select>
    <select id="wfr"><option value="">全部状态</option><option value="1">已解决</option><option value="0">未解决</option></select>
    <span class="page" id="wpg"></span>
    <button class="btn2" onclick="changeWPage(-1)">◀</button>
    <button class="btn2" onclick="changeWPage(1)">▶</button>
  </div>
  <table><thead><tr><th>设备</th><th>类型</th><th>日期</th><th>开始</th><th>结束</th><th>持续</th><th>重复</th><th>条码</th><th>状态</th></tr></thead><tbody id="wtb2"></tbody></table>
</div>

<script>
// ============================== PARSER ==============================
var LINE_RE=/^([NET]):\s+(\d{2})\s+(\d{2}:\d{2}:\d{2})\.(\d+)-(.+)$/;
var DEV_RE=/设备[：:](\w+)/;
var DEV2_RE=/<设备[：:](\w+)/;
var BC_RE=/报错[：:]\s*(.+?)(?:$|[,;，；])/;
var NR_RE=/错误条码\s*NOREAD/i;
var WM_RE=/等待WMS回复入库货位/;
var TF_RE=/任务写入(\d*)次?失败/;
var YC_RE=/异常[：:]\s*(.+?)(?:$|[,;，；])/;
var BC2_RE=/条码[：:]\s*(\w+)/;

function parseLine(line,fd){
  var m=line.match(LINE_RE);if(!m)return null;
  var l=m[1],t=m[3],ms=m[4],msg=m[5];
  var hh=t.split(':').map(Number);
  var ts=fd+'T'+String(hh[0]).padStart(2,'0')+':'+String(hh[1]).padStart(2,'0')+':'+String(hh[2]).padStart(2,'0')+'.'+ms;
  var dev=null;
  var dm=msg.match(DEV_RE);var dm2=msg.match(DEV2_RE);
  if(dm)dev=dm[1];else if(dm2)dev=dm2[1];
  var al=l;if(l==='E'&&WM_RE.test(msg))al='N';
  var et=null;
  if(al==='E'){
    var bc=msg.match(BC_RE);var yc=msg.match(YC_RE);
    if(bc)et=bc[1].trim();
    else if(NR_RE.test(msg))et='NOREAD';
    else if(TF_RE.test(msg))et='任务写入失败';
    else if(yc){var y=yc[1].trim();var o=y.match(/ORA-\d+/);et=o?o[0]:y.substring(0,40)}
    else if(msg.indexOf('错误')>=0||msg.indexOf('故障')>=0)et='其他';
    else et='未分类';
  }
  var barcode=null;
  var bm=msg.match(BC2_RE);if(bm)barcode=bm[1];
  return {ts:ts,date:fd,device:dev,level:al,type:et,barcode:barcode,msg:msg.substring(0,200)};
}

function parseLog(text,filename){
  var dm=filename.match(/(\d{4})(\d{2})(\d{2})/);
  var fd=dm?dm[1]+'-'+dm[2]+'-'+dm[3]:'unknown';
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  var entries=[];for(var i=0;i<lines.length;i++){var e=parseLine(lines[i],fd);if(e)entries.push(e);}
  return {filename:filename,date:fd,entries:entries};
}

// ============================== ANALYZER ==============================
function extractIncidents(entries){
  var open={};var closed=[];
  for(var i=0;i<entries.length;i++){
    var e=entries[i];
    if((e.level==='N'||e.level==='T')&&e.device){
      var keys=Object.keys(open);
      for(var k=0;k<keys.length;k++){
        var key=keys[k];var dev=key.split('|')[0];
        if(dev===e.device){
          var inc=open[key];inc.resolved=true;inc.dur=Math.round((new Date(e.ts)-new Date(inc.st))/1000);
          if(!inc.bc&&e.barcode)inc.bc=e.barcode;
          if(e.barcode)inc.rb=e.barcode;
          closed.push(inc);delete open[key];
        }
      }
      continue;
    }
    if(e.level!=='E'||!e.device)continue;
    var key=e.device+'|'+(e.type||'未分类');
    if(open[key]){open[key].et=e.ts;open[key].rc++;}
    else open[key]={device:e.device,type:e.type||'未分类',st:e.ts,et:e.ts,date:e.date,bc:e.barcode,rb:null,rc:1,resolved:false,dur:0};
  }
  var okeys=Object.keys(open);
  for(var i=0;i<okeys.length;i++){var inc=open[okeys[i]];inc.dur=Math.round((new Date(inc.et)-new Date(inc.st))/1000);closed.push(inc);}
  return closed.sort(function(a,b){return a.st.localeCompare(b.st);});
}

function summarize(inc){
  var res=inc.filter(function(i){return i.resolved;});
  var d=res.map(function(i){return i.dur;});
  var avg=d.length?Math.round(d.reduce(function(a,b){return a+b;},0)/d.length):0;
  var max=d.length?Math.max.apply(null,d):0;
  return{total:inc.length,resolved:res.length,unresolved:inc.length-res.length,avgSec:avg,maxSec:max};
}

function deviceRank(inc){
  var map={};
  for(var i=0;i<inc.length;i++){
    var dev=inc[i].device;if(!map[dev])map[dev]={device:dev,total:0,types:{}};
    map[dev].total++;map[dev].types[inc[i].type]=(map[dev].types[inc[i].type]||0)+1;
  }
  return Object.values(map).sort(function(a,b){return b.total-a.total;});
}

function typeDist(inc){
  var map={};
  for(var i=0;i<inc.length;i++){var t=inc[i].type;map[t]=(map[t]||0)+1;}
  var keys=Object.keys(map);
  return keys.map(function(k){return{type:k,count:map[k],pct:(map[k]/inc.length*100).toFixed(1)};}).sort(function(a,b){return b.count-a.count;});
}

function fmtDur(sec){
  if(sec<60)return sec+'秒';
  if(sec<3600)return Math.floor(sec/60)+'分'+sec%60+'秒';
  return Math.floor(sec/3600)+'时'+Math.floor((sec%3600)/60)+'分';
}

// ============================== STATE ==============================
var logStore={};var currentPage=1;var PAGE_SIZE=15;
var incidents=[],filtered=[];
var devChart=null,wdevChart=null,wtrendChart=null;
var currentTab='day';var activeDate='';
var weekIncidents=[],weekFiltered=[],weekPage=1;
var shared=false;

// ============================== IndexedDB STORAGE ==============================
var db=null;
function openDB(cb){
  var req=indexedDB.open('wcs_logs',1);
  req.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains('logs'))d.createObjectStore('logs',{keyPath:'date'});};
  req.onsuccess=function(e){db=e.target.result;loadFromDB(cb);};
  req.onerror=function(){if(cb)cb();};
}

function saveToDB(date,data){
  if(!db)return;
  try{var tx=db.transaction('logs','readwrite');var store=tx.objectStore('logs');store.put({date:date,filename:data.filename,entries:data.entries,_raw:data._raw||''});}catch(e){}
}

function loadFromDB(cb){
  if(!db){if(cb)cb();return;}
  try{
    var tx=db.transaction('logs','readonly');var store=tx.objectStore('logs');var req=store.getAll();
    req.onsuccess=function(){
      var items=req.result;for(var i=0;i<items.length;i++){var item=items[i];logStore[item.date]=item;}
      if(cb)cb();
    };
    req.onerror=function(){if(cb)cb();};
  }catch(e){if(cb)cb();}
}

function loadFromDB(cb){
  if(!db){if(cb)cb();return;}
  try{
    var tx=db.transaction('logs','readonly');var store=tx.objectStore('logs');var req=store.getAll();
    req.onsuccess=function(){
      var items=req.result;for(var i=0;i<items.length;i++){var item=items[i];logStore[item.date]=item;}
      if(cb)cb();
    };
    req.onerror=function(){if(cb)cb();};
  }catch(e){if(cb)cb();}
}

function clearDB(cb){
  if(!db){if(cb)cb();return;}
  try{var tx=db.transaction('logs','readwrite');var store=tx.objectStore('logs');store.clear();if(cb)tx.oncomplete=cb;}catch(e){if(cb)cb();}
}

// ============================== INIT ==============================
document.addEventListener('DOMContentLoaded',function(){
  // Set up upload handler
  document.getElementById('fupload').addEventListener('change',function(){
    var files=this.files;if(!files||!files.length)return;
    document.getElementById('msg').innerHTML='解析中...';
    var done=0;var html='';
    for(var i=0;i<files.length;i++){
      (function(file){
        var r=new FileReader();
        r.onload=function(){
          var p=parseLog(r.result,file.name);
          p._raw=r.result; // Keep raw for sharing
          logStore[p.date]=p;
          saveToDB(p.date,p);
          broadcastMQTT(p.date,p);
          html+='<span class="ok">'+file.name+' → '+p.entries.length+'条 / '+p.entries.filter(function(e){return e.level==='E';}).length+'错</span> ';
          done++;if(done>=files.length){document.getElementById('msg').innerHTML=html;currentPage=1;refresh();}
        };
        r.onerror=function(){html+='<span class="fail">'+file.name+':失败</span> ';done++;if(done>=files.length){document.getElementById('msg').innerHTML=html;currentPage=1;refresh();}};
        r.readAsText(file);
      })(files[i]);
    }
  });

  // Init: open IndexedDB → render
  openDB(function(){
    renderDateTabs();refreshDay();
  });
});

// ===== SHARED MODE =====
function uploadShared(input){
  var files=input.files;if(!files||!files.length)return;
  document.getElementById('msg').innerHTML='上传中...';
  var form=new FormData();for(var i=0;i<files.length;i++)form.append('logs',files[i]);
  fetch('/api/upload',{method:'POST',body:form}).then(function(r){return r.json();}).then(function(data){
    var html='';for(var i=0;i<data.results.length;i++){var r=data.results[i];html+=r.ok?'<span class="ok">'+r.filename+' → '+r.entries+'条 / '+r.errors+'错</span> ':'<span class="fail">'+r.filename+':错误</span> ';}
    document.getElementById('msg').innerHTML=html;currentPage=1;loadShared();
  }).catch(function(e){document.getElementById('msg').innerHTML='<span class="fail">上传失败</span>';});
}

function loadShared(){
  fetch('/api/dashboard').then(function(r){return r.json();}).then(function(d){
    if(d.empty){document.getElementById('tag').innerHTML='无数据 · 共享';resetStats();return;}
    document.getElementById('tag').innerHTML=d.dateCount+'天 · 共享';
    document.getElementById('s1').innerHTML=d.incidentsTotal;document.getElementById('s2').innerHTML=d.summary.resolved;
    document.getElementById('s3').innerHTML=d.summary.unresolved;document.getElementById('s4').innerHTML=d.summary.avgMin+'分';
    document.getElementById('s5').innerHTML=d.summary.maxMin+'分';document.getElementById('s6').innerHTML=d.dateCount;
    renderDevChart(d.deviceRank);renderErrorBars('errBars',d.errorDist);
    var fd=document.getElementById('fd');fd.innerHTML='<option value="">全部设备</option>';
    for(var i=0;i<d.deviceRank.length;i++)fd.innerHTML+='<option>'+d.deviceRank[i].device+'</option>';
    var ft=document.getElementById('ft');ft.innerHTML='<option value="">全部类型</option>';
    for(var i=0;i<d.errorDist.length;i++)ft.innerHTML+='<option>'+d.errorDist[i].type+'</option>';
    document.getElementById('fd').onchange=function(){currentPage=1;loadSharedIncidents();};
    document.getElementById('ft').onchange=function(){currentPage=1;loadSharedIncidents();};
    document.getElementById('fr').onchange=function(){currentPage=1;loadSharedIncidents();};
    loadSharedIncidents();
    // Date dropdown
    fetch('/api/dates').then(function(r){return r.json();}).then(function(dates){
      var sel=document.getElementById('dsel');sel.innerHTML='<option value="">全部（'+dates.length+'天）</option>';
      for(var i=0;i<dates.length;i++)sel.innerHTML+='<option value="'+dates[i].date+'"'+(activeDate===dates[i].date?' selected':'')+'>'+dates[i].date+' （'+dates[i].errors+'错）</option>';
      document.getElementById('btnDelDate').style.display=activeDate?'inline-block':'none';
    });
  }).catch(function(){document.getElementById('tag').innerHTML='加载失败';});
}

function loadSharedIncidents(){
  var p='page='+currentPage+'&pageSize='+PAGE_SIZE;
  var dev=document.getElementById('fd').value;var typ=document.getElementById('ft').value;var res=document.getElementById('fr').value;
  if(dev)p+='&device='+encodeURIComponent(dev);if(typ)p+='&errorType='+encodeURIComponent(typ);if(res)p+='&resolved='+res;
  if(activeDate)p+='&date='+activeDate;
  fetch('/api/incidents?'+p).then(function(r){return r.json();}).then(function(data){
    var tb=document.getElementById('tb');
    if(!data.incidents.length){tb.innerHTML='<tr><td colspan="9" style="color:#78809a;text-align:center;padding:20px">无匹配</td></tr>';}

function filterWeekIncidentsShared(idata){
  var dev=document.getElementById('wfd').value;var typ=document.getElementById('wft').value;var res=document.getElementById('wfr').value;

  if(dev)items=items.filter(function(i){return i.device===dev;});
  if(typ)items=items.filter(function(i){return i.errorType===typ;});
  if(res==='1')items=items.filter(function(i){return i.resolved;});
  if(res==='0')items=items.filter(function(i){return !i.resolved;});
  var start=(weekPage-1)*PAGE_SIZE;var page=items.slice(start,start+PAGE_SIZE);

  if(!page.length){tb.innerHTML='<tr><td colspan="9" style="color:#78809a;text-align:center;padding:20px">无匹配</td></tr>';}
  else{tb.innerHTML='';for(var i=0;i<page.length;i++){var inc=page[i];tb.innerHTML+='<tr><td><strong>'+inc.device+'</strong></td><td>'+inc.errorType+'</td><td>'+inc.date+'</td><td>'+(inc.startTimestamp||'').slice(11,19)+'</td><td>'+(inc.endTimestamp||'').slice(11,19)+'</td><td>'+inc.durationStr+'</td><td>'+inc.repeatCount+'</td><td>'+(inc.displayBarcode||inc.barcode||'-')+'</td><td class="'+(inc.resolved?'badge-ok':'badge-no')+'">'+(inc.resolved?'已解决':'未解决')+'</td></tr>';}}
  document.getElementById('wpg').innerHTML=items.length+'条 · '+weekPage+'/'+(Math.ceil(items.length/PAGE_SIZE)||1)+'页';
}

function getAllEntries(dateFilter){
  var entries=[];var dates=Object.keys(logStore);
  for(var i=0;i<dates.length;i++){
    if(dateFilter&&dates[i]!==dateFilter)continue;
    entries=entries.concat(logStore[dates[i]].entries);
  }
  entries.sort(function(a,b){return a.ts.localeCompare(b.ts);});
  return entries;
}

function renderDevChart(rank){
  if(devChart){devChart.destroy();devChart=null;}
  var ctx=document.getElementById('chartDev');if(!ctx||!rank.length)return;
  if(typeof Chart==='undefined'){document.getElementById('chartDev').parentNode.innerHTML='<span style="color:#78809a">图表加载失败</span>';return;}

  // Collect all error types and assign colors
  var allTypes={};var typeColors=[];
  for(var i=0;i<rank.length;i++){
    var types=Object.keys(rank[i].types);
    for(var j=0;j<types.length;j++){
      if(!allTypes[types[j]]){allTypes[types[j]]=true;typeColors.push(types[j]);}
    }
  }
  var colors=['#f44','#fa3','#f97316','#59f','#0c8','#a78bfa','#f472b6','#ff784b','#38bdf8','#a3e635'];

  // Build stacked datasets
  var datasets=[];
  for(var t=0;t<typeColors.length;t++){
    var typeName=typeColors[t];
    var data=[];
    for(var d=0;d<rank.length;d++){
      data.push(rank[d].types[typeName]||0);
    }
    datasets.push({
      label:typeName,
      data:data,
      backgroundColor:colors[t%colors.length],
      borderRadius:t===typeColors.length-1?4:0
    });
  }

  // Labels: device + top type
  var labels=rank.map(function(d){return d.device;});

  try{
    devChart=new Chart(ctx,{
      type:'bar',
      data:{labels:labels,datasets:datasets},
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{color:'#e0e4ec',font:{size:10},padding:2,boxWidth:10}}},
        scales:{
          x:{stacked:true,ticks:{color:'#78809a',font:{size:10}},grid:{color:'#2a3040'}},
          y:{stacked:true,ticks:{color:'#e0e4ec',font:{size:11}},grid:{display:false}}
        }
      }
    });
  }catch(e){document.getElementById('chartDev').parentNode.innerHTML='<span style="color:#f44">图表错误: '+e.message+'</span>';}
}

function renderErrorBars(id,dist){
  var c=document.getElementById(id);if(!c||!dist.length)return;
  var colors=['#f44','#fa3','#f97316','#59f','#0c8','#a78bfa','#78809a'];
  var max=dist[0].count;
  var html='';
  for(var i=0;i<Math.min(dist.length,15);i++){
    var d=dist[i];
    html+='<div class="eb-row"><span class="eb-label" title="'+d.type+'">'+d.type+'</span><div class="eb-track"><div class="eb-fill" style="width:'+Math.round(d.count/max*100)+'%;background:'+colors[i%7]+'"></div></div><span class="eb-count">'+d.count+'</span><span class="eb-pct">'+d.pct+'%</span></div>';
  }
  c.innerHTML=html;
}

function filterIncidents(){
  var dev=document.getElementById('fd').value;
  var typ=document.getElementById('ft').value;
  var res=document.getElementById('fr').value;
  filtered=[];
  for(var i=0;i<incidents.length;i++){
    var inc=incidents[i];
    if(dev&&inc.device!==dev)continue;
    if(typ&&inc.type!==typ)continue;
    if(res==='1'&&!inc.resolved)continue;
    if(res==='0'&&inc.resolved)continue;
    filtered.push(inc);
  }
  var start=(currentPage-1)*PAGE_SIZE;
  var items=filtered.slice(start,start+PAGE_SIZE);
  var tbody=document.getElementById('tb');
  if(!items.length){tbody.innerHTML='<tr><td colspan="9" style="color:#78809a;text-align:center;padding:20px">无匹配</td></tr>';}
  else{
    tbody.innerHTML='';
    for(var i=0;i<items.length;i++){
      var inc=items[i];
      tbody.innerHTML+='<tr><td><strong>'+inc.device+'</strong></td><td>'+inc.type+'</td><td>'+inc.date+'</td><td>'+inc.st.slice(11,19)+'</td><td>'+inc.et.slice(11,19)+'</td><td>'+fmtDur(inc.dur)+'</td><td>'+inc.rc+'</td><td>'+(inc.rb||inc.bc||'-')+'</td><td class="'+(inc.resolved?'badge-ok':'badge-no')+'">'+(inc.resolved?'已解决':'未解决')+'</td></tr>';
    }
  }
  var totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;
  document.getElementById('pg').innerHTML=filtered.length+'条 · '+currentPage+'/'+totalPages+'页';
}

function refreshWeek(){
  if(shared){loadSharedWeek();return;}
  var allDates=Object.keys(logStore).sort();
  if(!allDates.length){document.getElementById('wtb').innerHTML='<tr><td colspan="7" style="color:#78809a;text-align:center;padding:20px">无数据</td></tr>';return;}
  // Filter by week date range
  var wf=document.getElementById('wsFrom').value;
  var wt=document.getElementById('wsTo').value;
  var dates=[];
  for(var i=0;i<allDates.length;i++){
    if((!wf||allDates[i]>=wf)&&(!wt||allDates[i]<=wt))dates.push(allDates[i]);
  }
  if(!dates.length){document.getElementById('wtb').innerHTML='<tr><td colspan="7" style="color:#78809a;text-align:center;padding:20px">所选范围无数据</td></tr>';return;}
  var dailyData=[];
  for(var i=0;i<dates.length;i++){
    var entries=logStore[dates[i]].entries;
    var inc=extractIncidents(entries);
    var sum=summarize(inc);
    var rank=deviceRank(inc);
    var tops=[];
    for(var j=0;j<Math.min(5,rank.length);j++){tops.push(rank[j].device+'('+rank[j].total+')');}
    dailyData.push({date:dates[i],total:inc.length,resolved:sum.resolved,unresolved:sum.unresolved,avg:(sum.avgSec/60).toFixed(1),max:(sum.maxSec/60).toFixed(1),tops:tops.join(', ')});
  }

  // Week summary (filtered range)
  var allEntries=[];for(var i=0;i<dates.length;i++){allEntries=allEntries.concat(logStore[dates[i]].entries);}
  allEntries.sort(function(a,b){return a.ts.localeCompare(b.ts);});
  var allInc=extractIncidents(allEntries);
  var allSum=summarize(allInc);
  document.getElementById('wmsg').innerHTML='<span class="ok">共'+allInc.length+'条故障 · 已解决'+allSum.resolved+' · 平均'+(allSum.avgSec/60).toFixed(1)+'分 · 最长'+(allSum.maxSec/60).toFixed(1)+'分</span>';

  // Week device chart
  var wrank=deviceRank(allInc).slice(0,15);
  renderWDevChart(wrank);

  // Week error bars
  renderErrorBars('wErrBars',typeDist(allInc));

  // Trend chart
  renderWTrend(dailyData);

  // Table
  var tbody=document.getElementById('wtb');
  tbody.innerHTML='';
  for(var i=0;i<dailyData.length;i++){
    var d=dailyData[i];
    tbody.innerHTML+='<tr><td><strong>'+d.date+'</strong></td><td>'+d.total+'</td><td style="color:#0c8">'+d.resolved+'</td><td style="color:#f44">'+d.unresolved+'</td><td>'+d.avg+'分</td><td>'+d.max+'分</td><td>'+d.tops+'</td></tr>';
  }

  // Weekly incident list
  weekIncidents=extractIncidents(allEntries);
  var wrank=deviceRank(weekIncidents);var wdist=typeDist(weekIncidents);
  var wfd=document.getElementById('wfd');wfd.innerHTML='<option value="">全部设备</option>';
  for(var i=0;i<wrank.length;i++)wfd.innerHTML+='<option>'+wrank[i].device+'</option>';
  var wft=document.getElementById('wft');wft.innerHTML='<option value="">全部类型</option>';
  for(var i=0;i<wdist.length;i++)wft.innerHTML+='<option>'+wdist[i].type+'</option>';
  document.getElementById('wfd').onchange=function(){weekPage=1;filterWeekIncidents();};
  document.getElementById('wft').onchange=function(){weekPage=1;filterWeekIncidents();};
  document.getElementById('wfr').onchange=function(){weekPage=1;filterWeekIncidents();};
  weekPage=1;filterWeekIncidents();
}

// ============================== MQTT SHARING (chunked file transfer) ==============================
var mqttClient=null;var mqttConnected=false;
var MQTT_META='wcs/log/meta';
var MQTT_CHUNK='wcs/log/chunk';
var MQTT_HELLO='wcs/log/hello';
var CHUNK_SIZE=14000; // 14KB per chunk
var pendingChunks={}; // fileId → {filename,date,total,received,chunks}

function toggleMQTTConfig(){
  var c=document.getElementById('mqttCfg');
  c.style.display=c.style.display==='none'||!c.style.display?'flex':'none';
}

function connectMQTT(){
  if(typeof mqtt==='undefined'){document.getElementById('mqttStatus').innerHTML='<span style=\"color:#f44\">MQTT库未加载</span>';return;}
  var url=document.getElementById('mqttUrl').value.trim();
  if(!url){url='wss://broker.emqx.io:8084/mqtt';document.getElementById('mqttUrl').value=url;}
  disconnectMQTT();
  try{
    mqttClient=mqtt.connect(url);
    mqttClient.on('connect',function(){
      mqttConnected=true;
      mqttClient.subscribe([MQTT_META,MQTT_CHUNK,MQTT_HELLO]);
      document.getElementById('mqttStatus').innerHTML='<span style=\"color:#0c8\">已连接</span>';
      document.getElementById('btnMQTT').style.color='#0c8';
      document.getElementById('tag').innerHTML='在线 · 共享';
      // Say hello to request existing files
      mqttClient.publish(MQTT_HELLO,JSON.stringify({type:'hello',time:Date.now()}));
    });
    mqttClient.on('message',function(topic,payload){
      try{
        var msg=JSON.parse(payload.toString());
        if(topic===MQTT_HELLO&&msg.type==='hello'){
          // Respond with file list (meta)
          var dates=Object.keys(logStore);
          for(var i=0;i<dates.length;i++){
            var d=logStore[dates[i]];
            if(d._raw){ // has raw file content
              var fileId=d.date+'_'+Date.now()+'_'+i;
              var total=Math.ceil(d._raw.length/CHUNK_SIZE);
              mqttClient.publish(MQTT_META,JSON.stringify({fileId:fileId,filename:d.filename,date:d.date,total:total,size:d._raw.length}));
              // Send chunks with small delay
              sendChunks(fileId,d._raw,total);
            }
          }
        }else if(topic===MQTT_META&&msg.fileId){
          // New file incoming
          if(logStore[msg.date])return; // Already have this date
          pendingChunks[msg.fileId]={filename:msg.filename,date:msg.date,total:msg.total,received:0,chunks:[],size:msg.size};
        }else if(topic===MQTT_CHUNK&&msg.fileId){
          var pc=pendingChunks[msg.fileId];
          if(!pc)return;
          pc.chunks[msg.idx]=msg.data;
          pc.received++;
          if(pc.received>=pc.total){
            // Reassemble
            var raw='';for(var j=0;j<pc.total;j++)raw+=pc.chunks[j];
            delete pendingChunks[msg.fileId];
            // Parse
            var p=parseLog(raw,pc.filename);
            logStore[p.date]=p;p._raw=raw;
            saveToDB(p.date,p);
            renderDateTabs();refreshDay();
            document.getElementById('msg').innerHTML='<span class="ok">收到: '+pc.filename+' → '+p.entries.length+'条</span>';
          }
        }
      }catch(e){}
    });
    mqttClient.on('error',function(){
      document.getElementById('mqttStatus').innerHTML='<span style=\"color:#f44\">连接错误</span>';
    });
    mqttClient.on('close',function(){
      mqttConnected=false;
      document.getElementById('mqttStatus').innerHTML='<span style=\"color:#78809a\">已断开</span>';
      document.getElementById('btnMQTT').style.color='';
      document.getElementById('tag').innerHTML='离线';
    });
  }catch(e){document.getElementById('mqttStatus').innerHTML='<span style=\"color:#f44\">失败</span>';}
}

function sendChunks(fileId,raw,total){
  for(var i=0;i<total;i++){
    (function(idx){
      setTimeout(function(){
        if(!mqttClient||!mqttConnected)return;
        mqttClient.publish(MQTT_CHUNK,JSON.stringify({fileId:fileId,idx:idx,data:raw.substring(idx*CHUNK_SIZE,(idx+1)*CHUNK_SIZE)}));
      },idx*50); // 50ms between chunks
    })(i);
  }
}

function disconnectMQTT(){
  if(mqttClient){try{mqttClient.end();}catch(e){}mqttClient=null;}
  mqttConnected=false;
  document.getElementById('mqttStatus').innerHTML='';
  document.getElementById('btnMQTT').style.color='';
  document.getElementById('tag').innerHTML='离线';
}

function broadcastMQTT(date,data){
  if(!mqttClient||!mqttConnected)return;
  if(!data._raw)return; // No raw file content to share
  var fileId=date+'_'+Date.now();
  var total=Math.ceil(data._raw.length/CHUNK_SIZE);
  mqttClient.publish(MQTT_META,JSON.stringify({fileId:fileId,filename:data.filename,date:data.date,total:total,size:data._raw.length}));
  sendChunks(fileId,data._raw,total);
}

// ============================== CLEAR / EXPORT ==============================
function clearAll(){
  if(!confirm('确定清除所有数据？'))return;
  if(shared){fetch('/api/data',{method:'DELETE'}).then(function(){loadShared();});return;}
  logStore={};incidents=[];filtered=[];currentPage=1;
  if(devChart){devChart.destroy();devChart=null;}
  if(wdevChart){wdevChart.destroy();wdevChart=null;}
  if(wtrendChart){wtrendChart.destroy();wtrendChart=null;}
  clearDB(function(){renderDateTabs();refreshDay();});
}

function exportCSV(){
  if(shared){window.open('/api/export','_blank');return;}
  var csv='设备,错误类型,日期,开始时间,结束时间,持续(秒),重复次数,条码,状态\n';
  for(var i=0;i<incidents.length;i++){
    var inc=incidents[i];
    csv+=inc.device+','+inc.type+','+inc.date+','+inc.st.slice(11,19)+','+inc.et.slice(11,19)+','+inc.dur+','+inc.rc+','+(inc.rb||inc.bc||'')+','+(inc.resolved?'已解决':'未解决')+'\n';
  }
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wcs-incidents.csv';a.click();
  URL.revokeObjectURL(a.href);
}
