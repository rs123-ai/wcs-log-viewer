<script>
// ========================================== PARSER ==========================================
var LINE_RE=/^([NET]):\s+(\d{2})\s+(\d{2}:\d{2}:\d{2})\.(\d+)-(.+)$/;
var DEV_RE=/设备[：:](\w+)/;var DEV2_RE=/<设备[：:](\w+)/;
var BC_RE=/报错[：:]\s*(.+?)(?:$|[,;，；])/;var NR_RE=/错误条码\s*NOREAD/i;
var WM_RE=/等待WMS回复入库货位/;var TF_RE=/任务写入(\d*)次?失败/;
var YC_RE=/异常[：:]\s*(.+?)(?:$|[,;，；])/;var BC2_RE=/条码[：:]\s*(\w+)/;

function parseLine(line,fd){
  var m=line.match(LINE_RE);if(!m)return null;
  var l=m[1],t=m[3],ms=m[4],msg=m[5];
  var hh=t.split(':').map(Number);
  var ts=fd+'T'+String(hh[0]).padStart(2,'0')+':'+String(hh[1]).padStart(2,'0')+':'+String(hh[2]).padStart(2,'0')+'.'+ms;
  var dev=null;var dm=msg.match(DEV_RE);var dm2=msg.match(DEV2_RE);
  if(dm)dev=dm[1];else if(dm2)dev=dm2[1];
  var al=l;if(l==='E'&&WM_RE.test(msg))al='N';
  var et=null;
  if(al==='E'){
    var bc=msg.match(BC_RE);var yc=msg.match(YC_RE);
    if(bc)et=bc[1].trim();
    else if(NR_RE.test(msg))et='NOREAD';
    else if(TF_RE.test(msg))et='任务写入失败';
    else if(yc){var y=yc[1].trim();var o=y.match(/ORA-\d+/);et=o?o[0]:y.substring(0,40);}
    else if(msg.indexOf('错误')>=0||msg.indexOf('故障')>=0)et='其他';
    else et='未分类';
  }
  var barcode=null;var bm=msg.match(BC2_RE);if(bm)barcode=bm[1];
  return {ts:ts,date:fd,device:dev,level:al,type:et,barcode:barcode,msg:msg.substring(0,200)};
}

function parseLog(text,filename){
  var dm=filename.match(/(\d{4})(\d{2})(\d{2})/);
  var fd=dm?dm[1]+'-'+dm[2]+'-'+dm[3]:'unknown';
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  var entries=[];for(var i=0;i<lines.length;i++){var e=parseLine(lines[i],fd);if(e)entries.push(e);}
  return {filename:filename,date:fd,entries:entries};
}

// ========================================== ANALYZER ==========================================
function extractIncidents(entries){
  var open={};var closed=[];
  for(var i=0;i<entries.length;i++){
    var e=entries[i];var ts=e.ts;
    if((e.level==='N'||e.level==='T')&&e.device){
      var keys=Object.keys(open);
      for(var k=0;k<keys.length;k++){
        var key=keys[k];var dev=key.split('|')[0];
        if(dev===e.device){
          var inc=open[key];inc.resolved=true;inc.dur=Math.round((new Date(ts)-new Date(inc.st))/1000);
          if(!inc.bc&&e.barcode)inc.bc=e.barcode;if(e.barcode)inc.rb=e.barcode;
          closed.push(inc);delete open[key];
        }
      }
      continue;
    }
    if(e.level!=='E'||!e.device)continue;
    var key=e.device+'|'+(e.type||'未分类');
    if(open[key]){open[key].et=ts;open[key].rc++;}
    else open[key]={device:e.device,type:e.type||'未分类',st:ts,et:ts,date:e.date,bc:e.barcode,rb:null,rc:1,resolved:false,dur:0};
  }
  var okeys=Object.keys(open);
  for(var i=0;i<okeys.length;i++){var inc=open[okeys[i]];inc.dur=Math.round((new Date(inc.et)-new Date(inc.st))/1000);closed.push(inc);}
  return closed.sort(function(a,b){return a.st.localeCompare(b.st);});
}

function summarize(inc){
  var res=inc.filter(function(i){return i.resolved;});
  var d=res.map(function(i){return i.dur;});
  var avg=d.length?Math.round(d.reduce(function(a,b){return a+b;},0)/d.length):0;
  var max=d.length?Math.max.apply(null,d):0;
  return{total:inc.length,resolved:res.length,unresolved:inc.length-res.length,avgSec:avg,maxSec:max};
}

function deviceRank(inc){
  var map={};
  for(var i=0;i<inc.length;i++){var dev=inc[i].device;if(!map[dev])map[dev]={device:dev,total:0,types:{}};map[dev].total++;map[dev].types[inc[i].type]=(map[dev].types[inc[i].type]||0)+1;}
  return Object.values(map).sort(function(a,b){return b.total-a.total;});
}

function typeDist(inc){
  var map={};
  for(var i=0;i<inc.length;i++){var t=inc[i].type;map[t]=(map[t]||0)+1;}
  var keys=Object.keys(map);
  return keys.map(function(k){return{type:k,count:map[k],pct:(map[k]/inc.length*100).toFixed(1)};}).sort(function(a,b){return b.count-a.count;});
}

function fmtDur(sec){
  if(sec<60)return sec+'秒';if(sec<3600)return Math.floor(sec/60)+'分'+sec%60+'秒';
  return Math.floor(sec/3600)+'时'+Math.floor((sec%3600)/60)+'分';
}

// ========================================== IDENTITY + SETUP ==========================================
var myUID='';var myName='';var myBroker='';
var brokerList=[];var currentBroker=0;

function getSetup(){
  myUID=localStorage.getItem('wcs_uid');
  myName=localStorage.getItem('wcs_name')||'';
  myBroker=localStorage.getItem('wcs_broker')||'';
  if(!myUID){myUID='u'+Date.now()+'_'+Math.random().toString(36).substring(2,8);localStorage.setItem('wcs_uid',myUID);}
  if(!myName||!localStorage.getItem('wcs_name')){
    document.getElementById('modalOverlay').classList.add('show');
    document.getElementById('nickInput').focus();
    document.getElementById('brokerInput').value=myBroker||'wss://broker.emqx.io:8084/mqtt';
  }else{startApp();}
}

function saveSetup(){
  var name=document.getElementById('nickInput').value.trim();
  var brk=document.getElementById('brokerInput').value.trim();
  if(!brk)brk='wss://broker.emqx.io:8084/mqtt';
  if(!name){alert('请输入昵称');return;}
  myName=name;myBroker=brk;
  localStorage.setItem('wcs_name',name);localStorage.setItem('wcs_broker',brk);
  document.getElementById('modalOverlay').classList.remove('show');
  if(brk){brokerList=brk.split(',').map(function(s){return s.trim();}).filter(Boolean);}
  startApp();
}

function skipSetup(){
  myBroker='';localStorage.setItem('wcs_broker','');
  if(!myName){myName='User_'+myUID.substring(0,6);localStorage.setItem('wcs_name',myName);}
  document.getElementById('modalOverlay').classList.remove('show');
  startApp();
}

function reopenSetup(){
  document.getElementById('nickInput').value=myName;
  document.getElementById('brokerInput').value=myBroker||'';
  document.getElementById('modalOverlay').classList.add('show');
}

// ========================================== IndexedDB ==========================================
var db=null;
function openDB(cb){
  var req=indexedDB.open('wcs_logs_v2',1);
  req.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains('logs'))d.createObjectStore('logs',{keyPath:'date'});};
  req.onsuccess=function(e){db=e.target.result;loadFromDB(cb);};
  req.onerror=function(){if(cb)cb();};
}
function saveToDB(date,data){
  if(!db)return;
  try{var tx=db.transaction('logs','readwrite');tx.objectStore('logs').put({date:date,filename:data.filename,entries:data.entries,_raw:data._raw||''});}catch(e){}
}
function loadFromDB(cb){
  if(!db){if(cb)cb();return;}
  try{var tx=db.transaction('logs','readonly');var req=tx.objectStore('logs').getAll();
    req.onsuccess=function(){var items=req.result;for(var i=0;i<items.length;i++){var item=items[i];logStore[item.date]=item;}if(cb)cb();};
    req.onerror=function(){if(cb)cb();};
  }catch(e){if(cb)cb();}
}
function deleteFromDB(date,cb){
  if(!db){if(cb)cb();return;}
  try{var tx=db.transaction('logs','readwrite');tx.objectStore('logs').delete(date);if(cb)tx.oncomplete=cb;}catch(e){if(cb)cb();}
}
function clearDB(cb){
  if(!db){if(cb)cb();return;}
  try{var tx=db.transaction('logs','readwrite');tx.objectStore('logs').clear();if(cb)tx.oncomplete=cb;}catch(e){if(cb)cb();}
}

// ========================================== MQTT ==========================================
var mqttClient=null;var mqttConnected=false;
var peers={};var heartbeatTimer=null;
var CHUNK_SIZE=50000;var pendingChunks={};
var TOPIC_PEER='wcs/peer';var TOPIC_META='wcs/log/meta';var TOPIC_DELETE='wcs/log/delete';

function tryConnectMQTT(){
  if(!brokerList.length||typeof mqtt==='undefined')return;
  var url=brokerList[currentBroker];if(!url)return;
  disconnectMQTT();
  try{
    mqttClient=mqtt.connect(url,{keepalive:30,reconnectPeriod:0});
    mqttClient.on('connect',function(){
      mqttConnected=true;
      mqttClient.subscribe([TOPIC_PEER,TOPIC_META,TOPIC_DELETE],{qos:1});
      document.getElementById('tag').innerHTML='在线 · 共享';
      startHeartbeat();
      mqttClient.publish(TOPIC_PEER,JSON.stringify({uid:myUID,name:myName,ts:Date.now(),type:'hello'}),{qos:1});
    });
    mqttClient.on('message',function(topic,payload){
      try{var msg=JSON.parse(payload.toString());handleMQTT(topic,msg);}catch(e){}
    });
    mqttClient.on('error',function(){mqttConnected=false;switchBroker();});
    mqttClient.on('close',function(){mqttConnected=false;document.getElementById('tag').innerHTML='离线';stopHeartbeat();switchBroker();});
  }catch(e){switchBroker();}
}

var switchBrokerTimer=null;
function switchBroker(){
  if(switchBrokerTimer)return; // Already switching
  currentBroker=(currentBroker+1)%brokerList.length;
  switchBrokerTimer=setTimeout(function(){
    switchBrokerTimer=null;
    if(!mqttConnected)tryConnectMQTT();
  },5000);
}

function disconnectMQTT(){
  stopHeartbeat();
  if(mqttClient){try{mqttClient.end();}catch(e){}mqttClient=null;}
  mqttConnected=false;
}

function handleMQTT(topic,msg){
  if(msg.uid===myUID)return;
  if(topic===TOPIC_PEER){
    if(msg.type==='hello'){
      peers[msg.uid]={name:msg.name,ts:msg.ts||Date.now()};
      var dates=Object.keys(logStore);
      for(var i=0;i<dates.length;i++){
        var d=logStore[dates[i]];
        mqttClient.publish(TOPIC_META,JSON.stringify({uid:myUID,date:d.date,filename:d.filename,count:d.entries.length,ts:Date.now()}),{qos:1});
      }
    }
    updatePeerCount();
  }else if(topic===TOPIC_META){
    if(msg.date&&!logStore[msg.date]&&msg.uid){
      var reqTopic='wcs/log/req/'+myUID+'/'+msg.uid;
      mqttClient.subscribe('wcs/log/chunk/'+myUID,{qos:1});
      mqttClient.publish(reqTopic,JSON.stringify({date:msg.date,uid:myUID}),{qos:1});
      pendingChunks[msg.date]={uid:msg.uid,filename:msg.filename,total:0,received:0,chunks:[],raw:''};
    }
  }else if(topic===TOPIC_DELETE){
    if(msg.date){delete logStore[msg.date];deleteFromDB(msg.date);renderDateTabs();refreshDay();}
  }else if(topic.indexOf('wcs/log/chunk/')===0){
    var date=msg.date;var idx=msg.idx;var total=msg.total;
    if(!pendingChunks[date])return;
    var pc=pendingChunks[date];pc.chunks[idx]=msg.data;pc.received++;pc.total=total;
    if(pc.received>=pc.total){
      var raw='';for(var j=0;j<pc.total;j++)raw+=pc.chunks[j]||'';
      delete pendingChunks[date];var p=parseLog(raw,pc.filename);
      logStore[p.date]=p;p._raw=raw;saveToDB(p.date,p);
      renderDateTabs();refreshDay();
      document.getElementById('msg').innerHTML+='<span class="ok">收到: '+pc.filename+' → '+p.entries.length+'条</span> ';
    }
  }else if(topic.indexOf('wcs/log/req/')===0){
    var reqDate=msg.date;var senderUID=msg.uid;
    if(!logStore[reqDate]||!logStore[reqDate]._raw)return;
    var raw=logStore[reqDate]._raw;var total=Math.ceil(raw.length/CHUNK_SIZE);
    for(var i=0;i<total;i++){
      (function(idx){
        setTimeout(function(){
          if(!mqttClient||!mqttConnected)return;
          mqttClient.publish('wcs/log/chunk/'+senderUID,JSON.stringify({date:reqDate,idx:idx,total:total,data:raw.substring(idx*CHUNK_SIZE,(idx+1)*CHUNK_SIZE)}),{qos:1});
        },idx*30);
      })(i);
    }
  }
}

function startHeartbeat(){
  stopHeartbeat();
  heartbeatTimer=setInterval(function(){
    if(!mqttClient||!mqttConnected)return;
    mqttClient.publish(TOPIC_PEER,JSON.stringify({uid:myUID,name:myName,ts:Date.now(),type:'ping'}),{qos:1});
    var now=Date.now();var keys=Object.keys(peers);
    for(var i=0;i<keys.length;i++){if(now-peers[keys[i]].ts>35000)delete peers[keys[i]];}
    updatePeerCount();
  },18000);
}

function stopHeartbeat(){if(heartbeatTimer){clearInterval(heartbeatTimer);heartbeatTimer=null;}}

function updatePeerCount(){
  var count=Object.keys(peers).length;
  var el=document.getElementById('peerCount');
  if(count>0){el.style.display='inline';el.textContent='● '+count+'人在线';}
  else{el.style.display='none';}
}

// ========================================== STATE ==========================================
var logStore={};var currentPage=1;var PAGE_SIZE=15;
var incidents=[],filtered=[];
var devChart=null,wdevChart=null,wtrendChart=null;
var currentTab='day';var activeDate='';
var weekIncidents=[],weekFiltered=[],weekPage=1;

function getAllEntries(dateFilter){
  var entries=[];var dates=Object.keys(logStore);
  for(var i=0;i<dates.length;i++){if(dateFilter&&dates[i]!==dateFilter)continue;entries=entries.concat(logStore[dates[i]].entries);}
  entries.sort(function(a,b){return a.ts.localeCompare(b.ts);});return entries;
}

// ========================================== INIT ==========================================
function startApp(){
  openDB(function(){
    setupUpload();
    renderDateTabs();refreshDay();
    // Connect MQTT after a short delay
    if(brokerList.length)setTimeout(function(){tryConnectMQTT();},1000);
  });
}

function setupUpload(){
  document.getElementById('fupload').addEventListener('change',function(){
    var files=this.files;if(!files||!files.length)return;
    document.getElementById('msg').innerHTML='解析中...';
    var done=0;var html='';
    for(var i=0;i<files.length;i++){
      (function(file){
        var r=new FileReader();
        r.onload=function(){
          var p=parseLog(r.result,file.name);p._raw=r.result;
          logStore[p.date]=p;saveToDB(p.date,p);
          if(mqttConnected){
            mqttClient.publish(TOPIC_META,JSON.stringify({uid:myUID,date:p.date,filename:p.filename,count:p.entries.length,ts:Date.now()}),{qos:1});
          }
          html+='<span class="ok">'+file.name+' → '+p.entries.length+'条 / '+p.entries.filter(function(e){return e.level==='E';}).length+'错</span> ';
          done++;if(done>=files.length){document.getElementById('msg').innerHTML=html;currentPage=1;refresh();}
        };
        r.onerror=function(){html+='<span class="fail">'+file.name+':失败</span> ';done++;if(done>=files.length){document.getElementById('msg').innerHTML=html;currentPage=1;refresh();}};
        r.readAsText(file);
      })(files[i]);
    }
  });
}

// ========================================== UI ==========================================
function renderDateTabs(){
  var dates=Object.keys(logStore).sort();var sel=document.getElementById('dsel');
  sel.innerHTML='<option value="">全部（'+dates.length+'天）</option>';
  for(var i=0;i<dates.length;i++){
    var d=dates[i];var errs=logStore[d].entries.filter(function(e){return e.level==='E';}).length;
    sel.innerHTML+='<option value="'+d+'"'+(activeDate===d?' selected':'')+'>'+d+' （'+errs+'错）</option>';
  }
  document.getElementById('btnDelDate').style.display=activeDate?'inline-block':'none';
  var wf=document.getElementById('wsFrom');var wt=document.getElementById('wsTo');
  var wfVal=wf.value;var wtVal=wt.value;
  wf.innerHTML='<option value="">最早</option>';wt.innerHTML='<option value="">最晚</option>';
  for(var i=0;i<dates.length;i++){
    wf.innerHTML+='<option value="'+dates[i]+'"'+(wfVal===dates[i]?' selected':'')+'>'+dates[i]+'</option>';
    wt.innerHTML+='<option value="'+dates[i]+'"'+(wtVal===dates[i]?' selected':'')+'>'+dates[i]+'</option>';
  }
}

function selectDate(date){activeDate=date;currentPage=1;renderDateTabs();if(currentTab==='day')refreshDay();else refreshWeek();}
function refresh(){renderDateTabs();if(currentTab==='day')refreshDay();else refreshWeek();}

function refreshDay(){
  var entries=getAllEntries(activeDate);
  if(!entries.length){
    document.getElementById('tag').innerHTML=mqttConnected?'在线 · 无数据':'离线 · 无数据';
    document.getElementById('s1').innerHTML='-';document.getElementById('s2').innerHTML='-';document.getElementById('s3').innerHTML='-';
    document.getElementById('s4').innerHTML='-';document.getElementById('s5').innerHTML='-';document.getElementById('s6').innerHTML='-';
    document.getElementById('tb').innerHTML='';return;
  }
  incidents=extractIncidents(entries);var sum=summarize(incidents);
  var totalDates=Object.keys(logStore).length;
  document.getElementById('tag').innerHTML=(activeDate||'全部('+totalDates+'天)')+(mqttConnected?' · 共享':'');
  document.getElementById('s1').innerHTML=incidents.length;document.getElementById('s2').innerHTML=sum.resolved;
  document.getElementById('s3').innerHTML=sum.unresolved;document.getElementById('s4').innerHTML=(sum.avgSec/60).toFixed(1)+'分';
  document.getElementById('s5').innerHTML=(sum.maxSec/60).toFixed(1)+'分';document.getElementById('s6').innerHTML=totalDates;

  var rank=deviceRank(incidents).slice(0,15);renderDevChart(rank);
  var dist=typeDist(incidents);renderErrorBars('errBars',dist);
  var fd=document.getElementById('fd');fd.innerHTML='<option value="">全部设备</option>';
  for(var i=0;i<rank.length;i++)fd.innerHTML+='<option>'+rank[i].device+'</option>';
  var ft=document.getElementById('ft');ft.innerHTML='<option value="">全部类型</option>';
  for(var i=0;i<dist.length;i++)ft.innerHTML+='<option>'+dist[i].type+'</option>';
  document.getElementById('fd').onchange=function(){currentPage=1;filterIncidents();};
  document.getElementById('ft').onchange=function(){currentPage=1;filterIncidents();};
  document.getElementById('fr').onchange=function(){currentPage=1;filterIncidents();};
  filterIncidents();
}

function filterIncidents(){
  var dev=document.getElementById('fd').value;var typ=document.getElementById('ft').value;var res=document.getElementById('fr').value;
  filtered=[];
  for(var i=0;i<incidents.length;i++){var inc=incidents[i];if(dev&&inc.device!==dev)continue;if(typ&&inc.type!==typ)continue;if(res==='1'&&!inc.resolved)continue;if(res==='0'&&inc.resolved)continue;filtered.push(inc);}
  var start=(currentPage-1)*PAGE_SIZE;var items=filtered.slice(start,start+PAGE_SIZE);
  var tb=document.getElementById('tb');
  if(!items.length){tb.innerHTML='<tr><td colspan="9" style="color:#78809a;text-align:center;padding:20px">无匹配</td></tr>';}
  else{tb.innerHTML='';for(var i=0;i<items.length;i++){var inc=items[i];tb.innerHTML+='<tr><td><strong>'+inc.device+'</strong></td><td>'+inc.type+'</td><td>'+inc.date+'</td><td>'+inc.st.slice(11,19)+'</td><td>'+inc.et.slice(11,19)+'</td><td>'+fmtDur(inc.dur)+'</td><td>'+inc.rc+'</td><td>'+(inc.rb||inc.bc||'-')+'</td><td class="'+(inc.resolved?'badge-ok':'badge-no')+'">'+(inc.resolved?'已解决':'未解决')+'</td></tr>';}}
  document.getElementById('pg').innerHTML=filtered.length+'条 · '+currentPage+'/'+(Math.ceil(filtered.length/PAGE_SIZE)||1)+'页';
}

function renderDevChart(rank){
  if(devChart){devChart.destroy();devChart=null;}
  var ctx=document.getElementById('chartDev');if(!ctx||!rank.length)return;
  if(typeof Chart==='undefined')return;
  var allTypes={};var typeColors=[];
  for(var i=0;i<rank.length;i++){var types=Object.keys(rank[i].types);for(var j=0;j<types.length;j++){if(!allTypes[types[j]]){allTypes[types[j]]=true;typeColors.push(types[j]);}}}
  var colors=['#f44','#fa3','#f97316','#59f','#0c8','#a78bfa','#f472b6','#ff784b','#38bdf8','#a3e635'];
  var datasets=[];
  for(var t=0;t<typeColors.length;t++){var tn=typeColors[t];var data=[];for(var d=0;d<rank.length;d++)data.push(rank[d].types[tn]||0);datasets.push({label:tn,data:data,backgroundColor:colors[t%colors.length],borderRadius:t===typeColors.length-1?4:0});}
  try{devChart=new Chart(ctx,{type:'bar',data:{labels:rank.map(function(d){return d.device;}),datasets:datasets},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#e0e4ec',font:{size:10},padding:2,boxWidth:10}}},scales:{x:{stacked:true,ticks:{color:'#78809a',font:{size:10}},grid:{color:'#2a3040'}},y:{stacked:true,ticks:{color:'#e0e4ec',font:{size:11}},grid:{display:false}}}}});}catch(e){}
}

function renderErrorBars(id,dist){
  var c=document.getElementById(id);if(!c||!dist.length)return;
  var colors=['#f44','#fa3','#f97316','#59f','#0c8','#a78bfa','#78809a'];var max=dist[0].count;var html='';
  for(var i=0;i<Math.min(dist.length,15);i++){var d=dist[i];html+='<div class="eb-row"><span class="eb-label" title="'+d.type+'">'+d.type+'</span><div class="eb-track"><div class="eb-fill" style="width:'+Math.round(d.count/max*100)+'%;background:'+colors[i%7]+'"></div></div><span class="eb-count">'+d.count+'</span><span class="eb-pct">'+d.pct+'%</span></div>';}
  c.innerHTML=html;
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabDay').className='tab-btn'+(tab==='day'?' active':'');document.getElementById('tabWeek').className='tab-btn'+(tab==='week'?' active':'');
  document.getElementById('viewDay').style.display=tab==='day'?'block':'none';document.getElementById('viewWeek').style.display=tab==='week'?'block':'none';
  if(tab==='day')refreshDay();else refreshWeek();
}

function refreshWeek(){
  var allDates=Object.keys(logStore).sort();
  if(!allDates.length){document.getElementById('wtb').innerHTML='<tr><td colspan="7" style="color:#78809a;text-align:center;padding:20px">无数据</td></tr>';return;}
  var wf=document.getElementById('wsFrom').value;var wt=document.getElementById('wsTo').value;
  var dates=[];for(var i=0;i<allDates.length;i++){if((!wf||allDates[i]>=wf)&&(!wt||allDates[i]<=wt))dates.push(allDates[i]);}
  if(!dates.length){document.getElementById('wtb').innerHTML='<tr><td colspan="7" style="color:#78809a;text-align:center;padding:20px">所选范围无数据</td></tr>';return;}
  var dailyData=[];
  for(var i=0;i<dates.length;i++){
    var entries=logStore[dates[i]].entries;var inc=extractIncidents(entries);var sum=summarize(inc);var rank=deviceRank(inc);
    var tops=[];for(var j=0;j<Math.min(5,rank.length);j++)tops.push(rank[j].device+'('+rank[j].total+')');
    dailyData.push({date:dates[i],totalIncidents:inc.length,resolved:sum.resolved,unresolved:sum.unresolved,avgMin:(sum.avgSec/60).toFixed(1),maxMin:(sum.maxSec/60).toFixed(1),topDevices:rank.slice(0,5).map(function(d){return{device:d.device,count:d.total};})});
  }
  var allEntries=[];for(var i=0;i<dates.length;i++)allEntries=allEntries.concat(logStore[dates[i]].entries);
  allEntries.sort(function(a,b){return a.ts.localeCompare(b.ts);});
  var allInc=extractIncidents(allEntries);var allSum=summarize(allInc);
  document.getElementById('wmsg').innerHTML='<span class="ok">共'+allInc.length+'条 · 已解决'+allSum.resolved+' · 平均'+(allSum.avgSec/60).toFixed(1)+'分</span>';
  renderWDevChart(deviceRank(allInc).slice(0,15));renderErrorBars('wErrBars',typeDist(allInc));renderWTrend(dailyData);
  var tbody=document.getElementById('wtb');tbody.innerHTML='';
  for(var i=0;i<dailyData.length;i++){var d=dailyData[i];var tops='';for(var j=0;j<Math.min(d.topDevices.length,5);j++)tops+=d.topDevices[j].device+'('+d.topDevices[j].count+') ';tbody.innerHTML+='<tr><td><strong>'+d.date+'</strong></td><td>'+d.totalIncidents+'</td><td style="color:#0c8">'+d.resolved+'</td><td style="color:#f44">'+d.unresolved+'</td><td>'+d.avgMin+'分</td><td>'+d.maxMin+'分</td><td>'+tops+'</td></tr>';}

  weekIncidents=allInc;var wrank=deviceRank(weekIncidents);var wdist=typeDist(weekIncidents);
  var wfd=document.getElementById('wfd');wfd.innerHTML='<option value="">全部设备</option>';
  for(var i=0;i<wrank.length;i++)wfd.innerHTML+='<option>'+wrank[i].device+'</option>';
  var wft=document.getElementById('wft');wft.innerHTML='<option value="">全部类型</option>';
  for(var i=0;i<wdist.length;i++)wft.innerHTML+='<option>'+wdist[i].type+'</option>';
  document.getElementById('wfd').onchange=function(){weekPage=1;filterWeekIncidents();};
  document.getElementById('wft').onchange=function(){weekPage=1;filterWeekIncidents();};
  document.getElementById('wfr').onchange=function(){weekPage=1;filterWeekIncidents();};
  weekPage=1;filterWeekIncidents();
}

function renderWDevChart(rank){
  if(wdevChart){wdevChart.destroy();wdevChart=null;}
  var ctx=document.getElementById('chartWDev');if(!ctx||!rank.length)return;
  if(typeof Chart==='undefined')return;
  var allTypes={};var typeColors=[];
  for(var i=0;i<rank.length;i++){var types=Object.keys(rank[i].types);for(var j=0;j<types.length;j++){if(!allTypes[types[j]]){allTypes[types[j]]=true;typeColors.push(types[j]);}}}
  var colors=['#f44','#fa3','#f97316','#59f','#0c8','#a78bfa','#f472b6','#ff784b','#38bdf8','#a3e635'];
  var datasets=[];
  for(var t=0;t<typeColors.length;t++){var tn=typeColors[t];var data=[];for(var d=0;d<rank.length;d++)data.push(rank[d].types[tn]||0);datasets.push({label:tn,data:data,backgroundColor:colors[t%colors.length],borderRadius:t===typeColors.length-1?4:0});}
  try{wdevChart=new Chart(ctx,{type:'bar',data:{labels:rank.map(function(d){return d.device;}),datasets:datasets},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#e0e4ec',font:{size:10},padding:2,boxWidth:10}}},scales:{x:{stacked:true,ticks:{color:'#78809a',font:{size:10}},grid:{color:'#2a3040'}},y:{stacked:true,ticks:{color:'#e0e4ec',font:{size:11}},grid:{display:false}}}}});}catch(e){}
}

function renderWTrend(dailyData){
  if(wtrendChart){wtrendChart.destroy();wtrendChart=null;}
  var ctx=document.getElementById('chartWTrend');if(!ctx||!dailyData.length)return;
  if(typeof Chart==='undefined')return;
  try{wtrendChart=new Chart(ctx,{type:'bar',data:{labels:dailyData.map(function(d){return d.date.slice(5);}),datasets:[{label:'故障',data:dailyData.map(function(d){return d.totalIncidents||0;}),backgroundColor:'rgba(244,68,68,0.7)',borderRadius:4},{label:'已解决',data:dailyData.map(function(d){return d.resolved||0;}),backgroundColor:'rgba(0,200,150,0.7)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#e0e4ec',font:{size:11}}}},scales:{x:{ticks:{color:'#78809a'},grid:{display:false}},y:{ticks:{color:'#78809a'},grid:{color:'#2a3040'}}}}});}catch(e){}
}

function filterWeekIncidents(){
  var dev=document.getElementById('wfd').value;var typ=document.getElementById('wft').value;var res=document.getElementById('wfr').value;
  weekFiltered=[];
  for(var i=0;i<weekIncidents.length;i++){var inc=weekIncidents[i];if(dev&&inc.device!==dev)continue;if(typ&&inc.type!==typ)continue;if(res==='1'&&!inc.resolved)continue;if(res==='0'&&inc.resolved)continue;weekFiltered.push(inc);}
  var start=(weekPage-1)*PAGE_SIZE;var items=weekFiltered.slice(start,start+PAGE_SIZE);
  var tb=document.getElementById('wtb2');
  if(!items.length){tb.innerHTML='<tr><td colspan="9" style="color:#78809a;text-align:center;padding:20px">无匹配</td></tr>';}
  else{tb.innerHTML='';for(var i=0;i<items.length;i++){var inc=items[i];tb.innerHTML+='<tr><td><strong>'+inc.device+'</strong></td><td>'+inc.type+'</td><td>'+inc.date+'</td><td>'+inc.st.slice(11,19)+'</td><td>'+inc.et.slice(11,19)+'</td><td>'+fmtDur(inc.dur)+'</td><td>'+inc.rc+'</td><td>'+(inc.rb||inc.bc||'-')+'</td><td class="'+(inc.resolved?'badge-ok':'badge-no')+'">'+(inc.resolved?'已解决':'未解决')+'</td></tr>';}}
  document.getElementById('wpg').innerHTML=weekFiltered.length+'条 · '+weekPage+'/'+(Math.ceil(weekFiltered.length/PAGE_SIZE)||1)+'页';
}

function changePage(d){currentPage=Math.max(1,currentPage+d);filterIncidents();}
function changeWPage(d){weekPage=Math.max(1,weekPage+d);filterWeekIncidents();}

function deleteCurrentDate(){
  if(!activeDate)return;
  if(!confirm('确定删除 '+activeDate+' ？'))return;
  delete logStore[activeDate];deleteFromDB(activeDate);
  if(mqttConnected)mqttClient.publish(TOPIC_DELETE,JSON.stringify({uid:myUID,date:activeDate,ts:Date.now()}),{qos:1});
  activeDate='';renderDateTabs();refreshDay();
}

function clearAll(){
  if(!confirm('确定清除所有数据？'))return;
  logStore={};incidents=[];filtered=[];currentPage=1;
  if(devChart){devChart.destroy();devChart=null;}if(wdevChart){wdevChart.destroy();wdevChart=null;}if(wtrendChart){wtrendChart.destroy();wtrendChart=null;}
  if(mqttConnected)mqttClient.publish(TOPIC_DELETE,JSON.stringify({uid:myUID,date:'*',ts:Date.now()}),{qos:1});
  clearDB(function(){renderDateTabs();refreshDay();});
}

function exportCSV(){
  var csv='设备,错误类型,日期,开始时间,结束时间,持续(秒),重复次数,条码,状态\n';
  for(var i=0;i<incidents.length;i++){var inc=incidents[i];csv+=inc.device+','+inc.type+','+inc.date+','+inc.st.slice(11,19)+','+inc.et.slice(11,19)+','+inc.dur+','+inc.rc+','+(inc.rb||inc.bc||'')+','+(inc.resolved?'已解决':'未解决')+'\n';}
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wcs-incidents.csv';a.click();URL.revokeObjectURL(a.href);
}

getSetup();
